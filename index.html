<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zábavní Servis 365</title>
    <style>
        /* Základní styly */
        body { font-family: sans-serif; margin: 0; color: #333; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Navigace */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: white; }
        .nav-menu { display: flex; gap: 20px; align-items: center; }
        
        /* Hero sekce */
        .hero { background: #6c5ce7; color: white; padding: 60px; border-radius: 50px; text-align: center; }
        .hero-buttons { margin-top: 20px; }
        .btn { padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        
        /* Mřížka služeb */
        .services-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 40px; }
        .service-card { border: 2px solid #ddd; padding: 15px; border-radius: 20px; text-align: center; }
        
        /* Sekce "O nás" a zbytek */
        .content-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; margin-top: 50px; }
        .card-box { border: 1px solid #eee; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">ZÁBAVNÍ SERVIS 365</div>
    <div class="nav-menu">
        <span>DOMŮ</span><span>MASKOTI</span><span>CUKROVÁ VATA</span><span>KONTAKT</span>
    </div>
</header>

<div class="container">
    <!-- Hero část z image.png -->
    <section class="hero">
        <h1>KOMPLETNÍ ZÁBAVA PRO KAŽDOU PÁRTY</h1>
        <div class="hero-buttons">
            <button class="btn">VYTVOŘIT POPTÁVKU</button>
            <button class="btn">PROHLÉDNOUT BALÍČKY</button>
        </div>
    </section>

    <!-- Mřížka služeb z image.png -->
    <section class="services-grid">
        <div class="service-card">NAŠI MASKOTI</div>
        <div class="service-card">CUKROVÁ VATA</div>
        <div class="service-card">MALOVÁNÍ</div>
        <div class="service-card">POPCORN</div>
        <div class="service-card">ATRAKCE</div>
    </section>

    <!-- Hlavní obsah z image.png -->
    <div class="content-layout">
        <main>
            <h2>O NÁS: ROZPOHYBUJEME KAŽDOU OSLAVU</h2>
            <div class="card-box">Zde bude text o nás...</div>
            <h2>GALERIE NAŠICH ÚSPĚCHŮ</h2>
            <div class="card-box">Zde bude galerie...</div>
        </main>
        <aside>
            <h2>REFERENCE</h2>
            <div class="card-box">Zde budou reference...</div>
            <div class="card-box">
                <h3>KONTAKTNÍ FORMULÁŘ</h3>
                <input type="text" placeholder="Jméno"><br>
                <input type="text" placeholder="E-mail"><br>
                <textarea placeholder="Zpráva"></textarea>
            </div>
        </aside>
    </div>
</div>

</body>
</html>
